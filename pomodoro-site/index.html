<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>番茄钟</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <span class="logo">🍅 番茄钟</span>
  <a href="settings.html" class="nav-btn" aria-label="设置">
    <i class="ti ti-settings"></i> 设置
  </a>
</header>

<main>
  <div class="mode-tabs" role="tablist">
    <button class="mode-btn active" role="tab" onclick="setMode('focus')">专注</button>
    <button class="mode-btn" role="tab" onclick="setMode('short')">短休息</button>
    <button class="mode-btn" role="tab" onclick="setMode('long')">长休息</button>
  </div>

  <div class="timer-circle" aria-live="polite" aria-label="计时器">
    <svg viewBox="0 0 260 260">
      <circle class="ring-bg" cx="130" cy="130" r="114"/>
      <circle class="ring-fg" id="ring" cx="130" cy="130" r="114"/>
    </svg>
    <div class="timer-inner">
      <div class="timer-time" id="display">25:00</div>
      <div class="timer-label" id="mode-label">专注时间</div>
    </div>
  </div>

  <div class="controls">
    <button class="ctrl-btn" onclick="resetTimer()" title="重置">
      <i class="ti ti-refresh"></i>
    </button>
    <button class="ctrl-btn primary" id="startBtn" onclick="toggleTimer()" title="开始/暂停">
      <i class="ti ti-player-play" id="playIcon"></i>
    </button>
    <button class="ctrl-btn" onclick="skipTimer()" title="跳过">
      <i class="ti ti-player-skip-forward"></i>
    </button>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-val" id="count">0</div>
      <div class="stat-lbl">完成番茄</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <div class="stat-val" id="totalMin">0</div>
      <div class="stat-lbl">专注分钟</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <div class="stat-val" id="streakCount">0</div>
      <div class="stat-lbl">连续天数</div>
    </div>
  </div>

  <div class="task-box">
    <input type="text" id="taskInput" placeholder="现在要做什么？" maxlength="60" />
  </div>
</main>

<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
